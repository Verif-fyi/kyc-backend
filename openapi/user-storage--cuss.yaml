openapi: 3.1.0
info:
  title: Customer Registration Service API
  description: API for the two-stage customer registration process, as documented in registration_flow.md.
  version: 1.0.0
servers:
- url: http://localhost:8081
  description: Local development server
tags:
- name: Registration
  description: Endpoints for customer registration and account activation.
paths:
  /api/registration/register:
    post:
      tags:
      - Registration
      operationId: registerCustomer
      summary: Stage 1 - Register a new customer and create a pending savings account.
      description: |
        Initiates the first stage of a new customer registration. It creates the client and a savings account in a pending state.
        This operation is idempotent based on the `externalId`. If a request with a previously used `externalId` is sent, the system will not create a new client and will respond appropriately.
      security:
      - KcSignature: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegistrationRequest'
      responses:
        '201':
          description: Client and account created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegistrationResponse'
        '400':
          description: Bad Request - Invalid input data.
        '401':
          description: Unauthorized - JWT token is missing or invalid.
        '403':
          description: Forbidden - The caller does not have the required ROLE_KYC_MANAGER authority.
  /api/registration/approve-and-deposit:
    post:
      tags:
      - Registration
      operationId: approveAndDeposit
      summary: Stage 2 - Approve, activate, and optionally deposit funds.
      description: |
        Initiates the second stage of the registration process. It approves and activates the savings account created in Stage 1.
        An optional initial deposit can be made.
      security:
      - KcSignature: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApproveAndDepositRequest'
      responses:
        '200':
          description: Account activated and deposit successful.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApproveAndDepositResponse'
        '400':
          description: Bad Request - Invalid input data, e.g., savings account does not exist or is already active.
        '401':
          description: Unauthorized - JWT token is missing or invalid.
        '403':
          description: Forbidden - The caller does not have the required ROLE_KYC_MANAGER authority.
components:
  securitySchemes:
    KcSignature:
      type: apiKey
      in: header
      name: x-kc-signature
  schemas:
    RegistrationRequest:
      type: object
      required:
      - fullName
      - phone
      - externalId
      properties:
        fullName:
          type: string
          description: The customer's full name.
          examples:
          - Brenda Biya
        email:
          type: string
          format: email
          description: The customer's email address.
          examples:
          - brenda.biya@example.cm
        phone:
          type: string
          description: The customer's mobile phone number.
          examples:
          - "+237691111111"
        externalId:
          type: string
          description: A unique identifier from the external identity system. This is used for idempotency.
          examples:
          - external-id-001
        dateOfBirth:
          type: string
          format: date
          description: Format YYYY-MM-DD.
          examples:
          - '1990-01-15'
    RegistrationResponse:
      type: object
      properties:
        success:
          type: boolean
          examples:
          - true
        status:
          type: string
          examples:
          - success
        fineractClientId:
          type: integer
          format: int64
          examples:
          - 102
        savingsAccountId:
          type: integer
          format: int64
          examples:
          - 205
    ApproveAndDepositRequest:
      type: object
      required:
      - savingsAccountId
      properties:
        savingsAccountId:
          type: integer
          format: int64
          description: The ID of the savings account obtained from the registration step.
          examples:
          - 205
        depositAmount:
          type: number
          format: double
          description: The amount to deposit. If not provided or zero, the account will only be approved and activated.
          examples:
          - 1000
    ApproveAndDepositResponse:
      type: object
      properties:
        success:
          type: boolean
          examples:
          - true
        status:
          type: string
          examples:
          - success
        savingsAccountId:
          type: integer
          format: int64
          examples:
          - 205
        transactionId:
          type: integer
          format: int64
          description: The ID of the deposit transaction, if a deposit was made.
          examples:
          - 512
