services:
  download-core-tools:
    image: alpine/curl
    environment:
      KEYCLOAK_PLUGIN_VERSION: "0.2.6"
      OPENAPI_GENERATOR_VERSION: "7.19.0"
    command:
      - /bin/sh
      - -c
      - |
        set -ex;
        rm -rf /data/*
        mkdir -p /data/bin
        mkdir -p /data/kc-plugins

        download() {
          output="$$1"
          url="$$2"
          curl -fL \
            --retry 8 \
            --retry-delay 2 \
            --retry-all-errors \
            --connect-timeout 10 \
            --max-time 300 \
            -o "$$output" "$$url"
        }

        echo "Download OpenAPI generator (we're using it to generate code from OpenAPI specs...";
        download /data/bin/openapi-generator-cli.jar "https://repo1.maven.org/maven2/org/openapitools/openapi-generator-cli/$$OPENAPI_GENERATOR_VERSION/openapi-generator-cli-$$OPENAPI_GENERATOR_VERSION.jar"

        echo "Download OpenAPI for Keycloak...";
        download /data/keycloak-interface.openapi.yaml "https://github.com/stephane-segning/keycloak-keybound/releases/download/v$$KEYCLOAK_PLUGIN_VERSION/backend.open-api.yml"
        echo "Downloaded OpenAPI for Keycloak";

        echo "Download keybound...";
        download /data/kc-plugins/keycloak-keybound-all.jar "https://github.com/stephane-segning/keycloak-keybound/releases/download/v$$KEYCLOAK_PLUGIN_VERSION/keycloak-keybound-all-$$KEYCLOAK_PLUGIN_VERSION-all.jar"
        download /data/kc-plugins/keycloak-keybound-api-gateway-http.jar "https://github.com/stephane-segning/keycloak-keybound/releases/download/v$$KEYCLOAK_PLUGIN_VERSION/keycloak-keybound-api-gateway-http-$$KEYCLOAK_PLUGIN_VERSION.jar"
        download /data/kc-plugins/keycloak-keybound-custom-endpoint.jar "https://github.com/stephane-segning/keycloak-keybound/releases/download/v$$KEYCLOAK_PLUGIN_VERSION/keycloak-keybound-custom-endpoint-$$KEYCLOAK_PLUGIN_VERSION.jar"
        download /data/kc-plugins/keycloak-keybound-grant-device-key.jar "https://github.com/stephane-segning/keycloak-keybound/releases/download/v$$KEYCLOAK_PLUGIN_VERSION/keycloak-keybound-grant-device-key-$$KEYCLOAK_PLUGIN_VERSION.jar"
        download /data/kc-plugins/keycloak-keybound-user-storage-backend.jar "https://github.com/stephane-segning/keycloak-keybound/releases/download/v$$KEYCLOAK_PLUGIN_VERSION/keycloak-keybound-user-storage-backend-$$KEYCLOAK_PLUGIN_VERSION.jar"
        echo "Downloaded keybound";

    volumes:
      - downloaded_data:/data

  generate-code:
    image: amazoncorretto:21
    user: root
    environment:
      USER_ID: "${USER_ID:-1000}"
      GROUP_ID: "${GROUP_ID:-1000}"
    depends_on:
      download-core-tools:
        condition: service_completed_successfully
    configs:
      - source: oas_client_cuss
        target: /tmp/oas_client_cuss.json
      - source: oas_kc_openapi
        target: /tmp/oas_kc_openapi.json
        mode: 444
    volumes:
      - downloaded_data:/data
      - ../../app/gen:/work
      - ../../openapi:/openapi
    command:
      - /bin/sh
      - -c
      - |
        set -e;

        JAR_FILE=/data/bin/openapi-generator-cli.jar

        for item in oas_client_cuss; do
            echo "Generating $$item..."
            
            # Generate to a local container directory first to avoid bind mount issues
            TMP_DIR="/tmp/gen_$$item"
            rm -rf "$$TMP_DIR"
            mkdir -p "$$TMP_DIR"
            
            java -jar "$$JAR_FILE" generate \
              -c "/tmp/$$item.json" \
              -o "$$TMP_DIR" \
              --skip-validate-spec
            
            # Now move to the bind mount
            echo "Moving $$item to /work..."
            rm -rf "/work/$$item"
            mkdir -p "/work/$$item"
            cp -a "$$TMP_DIR"/. "/work/$$item/"
            rm -rf "$$TMP_DIR"
        done

        # Generate OpenAPI JSON spec for KC (to include in Swagger UI)
        echo "Generating KC OpenAPI JSON..."
        TMP_DIR="/tmp/gen_oas_kc_openapi"
        rm -rf "$$TMP_DIR"
        mkdir -p "$$TMP_DIR"
        java -jar "$$JAR_FILE" generate \
          -c "/tmp/oas_kc_openapi.json" \
          -o "$$TMP_DIR" \
          --skip-validate-spec \
          --global-property=apis=false,models=false,apiDocs=false,modelDocs=false

        # Create directory for KC OpenAPI spec
        mkdir -p /work/kc_openapi
        # The openapi-generator puts the spec in the output root
        cp "$$TMP_DIR"/*.json /work/kc_openapi/ 2>/dev/null || \
          cp "$$TMP_DIR"/openapi.json /work/kc_openapi/ 2>/dev/null || \
          find "$$TMP_DIR" -name "openapi*.json" -exec cp {} /work/kc_openapi/ \; || true
        rm -rf "$$TMP_DIR"

        echo "Fixing permissions for $$USER_ID:$$GROUP_ID..."
        chown -R "$$USER_ID:$$GROUP_ID" /work

volumes:
  downloaded_data:

configs:
  oas_client_cuss:
    content: |
      {
        "inputSpec": "/openapi/user-storage--cuss.yaml",
        "generatorName": "rust",
        "packageName": "gen_oas_client_cuss",
        "packageVersion": "9.9.9"
      }
  oas_kc_openapi:
    content: |
      {
        "inputSpec": "/openapi/keycloak-interface.openapi.yaml",
        "generatorName": "openapi",
        "packageName": "kc_openapi",
        "packageVersion": "9.9.9"
      }
