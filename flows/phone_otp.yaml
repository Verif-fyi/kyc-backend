flow_type: phone_otp
human_id_prefix: phone_otp
feature: flow-phone-otp
initial_step: init_phone

steps:
  init_phone:
    action: WAIT
    actor: END_USER
    config:
      actor: USER
    next: get_user

  get_user:
    action: GET_USER
    actor: SYSTEM
    config:
      save_to: session
    next: sync_phone_to_flow

  sync_phone_to_flow:
    action: update-phone-number
    actor: SYSTEM
    config:
      source: flow
      source_path: /step_output/init_phone/phone_number
      update_user: true
    next: generate_otp

  generate_otp:
    action: GENERATE_OTP
    actor: SYSTEM
    config:
      length: 6
      expiry_seconds: 300
      save_to: flow
    next: debug_generated_otp

  debug_generated_otp:
    action: DEBUG_LOG
    actor: SYSTEM
    config:
      message: "Generated phone OTP"
      flow_pointers:
      - /otp
      - /otp_expires_at
    next: send_otp_webhook

  send_otp_webhook:
    action: WEBHOOK_HTTP
    actor: SYSTEM
    config:
      url: ${SMS_SINK_URL}/otp
      method: POST
      timeout_ms: 5000
      payload_mappings:
      - source: flow
        source_path: /phone_number
        target_path: /phone
      - source: flow
        source_path: /otp
        target_path: /otp
      success_condition:
        status_codes:
        - 200
    next: debug_sent_otp
    fail: FAILED

  debug_sent_otp:
    action: DEBUG_LOG
    actor: SYSTEM
    config:
      message: "OTP webhook sent"
      flow_pointers:
      - /step_output/send_otp_webhook
    next: verify_otp

  verify_otp:
    action: VERIFY_OTP
    actor: END_USER
    config:
      input_field: code
      stored_field: otp
      max_attempts: 3
      attempts_field: otp_attempts
    branches:
      verified: debug_verified_otp
      retry: verify_otp
    fail: FAILED

  debug_verified_otp:
    action: DEBUG_LOG
    actor: SYSTEM
    config:
      message: "Phone OTP verified"
      flow_pointers:
      - /step_output/verify_otp
    next: check_phone_unique

  # Cuss-side phone-uniqueness gate. We hit cuss as soon as the user has
  # proved phone ownership; if the phone is already linked to another
  # Fineract client we end the flow with FAILED rather than letting the
  # user continue through legal acceptance + admin review only to wedge
  # at cuss_register_customer in the first_deposit flow.
  #
  # POST + JSON body (not GET + ?phone=...) so the literal `+` in E.164
  # phones survives transit — Spring's @RequestParam decodes `+` as
  # space, which would break every lookup.
  check_phone_unique:
    action: WEBHOOK_HTTP
    actor: SYSTEM
    config:
      url: "${CUSS_URL}/api/registration/check-phone"
      method: POST
      timeout_ms: 5000
      retryable: false
      auth:
        type: oauth2
        token_url: "${KC_TOKEN_URL}"
        client_id: "${CUSS_CLIENT_ID}"
        client_secret: "${CUSS_CLIENT_SECRET}"
      payload_mappings:
        - source: session
          source_path: /phone_number
          target_path: /phone
      success_condition:
        status_codes: [200]
      extraction_rules:
        - json_pointer: /exists
          target_path: /phone_already_registered
          target_context: flow_context
        - json_pointer: /externalId
          target_path: /existing_external_id_for_phone
          target_context: flow_context
    next: gate_phone_uniqueness
    fail: FAILED

  gate_phone_uniqueness:
    action: CONDITIONAL
    actor: SYSTEM
    config:
      source: flow
      pointer: /phone_already_registered
      cases:
        "true": phone_already_registered_terminal
        "false": continue_to_set_phone
      default_branch: continue_to_set_phone
    branches:
      phone_already_registered_terminal: phone_already_registered_terminal
      continue_to_set_phone: set_user_phone_number
    fail: FAILED

  phone_already_registered_terminal:
    action: DEBUG_LOG
    actor: SYSTEM
    config:
      message: "Phone OTP gate: phone is already linked to another Fineract client"
      flow_pointers:
      - /existing_external_id_for_phone
    next: FAILED

  set_user_phone_number:
    action: update-phone-number
    actor: SYSTEM
    config:
      source: session
      source_path: /phone_number
      update_user: true
    next: mark_phone_verified

  mark_phone_verified:
    action: UPDATE_USER_METADATA
    actor: SYSTEM
    config:
      mappings:
      - target_path: /phone/number
        source: session
        source_path: /phone_number
      - target_path: /phone/verified
        value: true
      - target_path: /kyc/phoneOtpVerified
        value: true
    next: COMPLETE

  COMPLETE:
    action: NOOP
    actor: SYSTEM
